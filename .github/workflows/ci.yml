name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # Set up Rust toolchain for running cargo tests
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      # Install cargo-nextest for faster/parallel test execution
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Run all Rust tests via cargo nextest (runs inline #[test], #[cfg(test)], integration tests under tests/)
      - name: Run all Rust tests
        run: cargo nextest run --workspace --all-features

      # Run Nx targets for lint, build, typecheck
      - run: npx nx run-many -t lint build typecheck
