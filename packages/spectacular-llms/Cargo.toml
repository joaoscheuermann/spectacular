[package]
name = "spectacular-llms"
version = "0.1.0"
edition = "2021"

[dependencies]
reqwest = { version = "0.12.24", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["sync", "rt"] }

[dev-dependencies]
futures = "0.3.31"
