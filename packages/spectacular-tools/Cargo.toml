[package]
name = "spectacular-tools"
version = "0.1.0"
edition = "2021"

[dependencies]
anstyle = "1.0.14"
glob = "0.3"
ignore = "0.4"
regex = "1"
reqwest = { version = "0.12.24", default-features = false, features = ["rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
similar = "2"
spectacular-agent = { path = "../spectacular-agent" }
tokio = { version = "1.48.0", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "time"] }
