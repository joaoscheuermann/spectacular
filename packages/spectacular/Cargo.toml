[package]
name = "spectacular"
version = "0.1.0"
edition = "2021"

[dependencies]
anstyle = "1.0.14"
chrono = { version = "0.4.42", default-features = false, features = ["clock", "serde"] }
clap = { version = "4.5.49", features = ["derive"] }
crossterm = { version = "0.29.0", features = ["bracketed-paste"] }
iocraft = "=0.8.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
spectacular-agent = { path = "../spectacular-agent" }
spectacular-commands = { path = "../spectacular-commands" }
spectacular-config = { path = "../spectacular-config" }
spectacular-llms = { path = "../spectacular-llms" }
spectacular-plan = { path = "../spectacular-plan" }
spectacular-tools = { path = "../spectacular-tools" }
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "signal", "time"] }
unicode-width = "0.1.14"
